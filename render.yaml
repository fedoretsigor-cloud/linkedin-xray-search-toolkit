services:
  - type: web
    name: engineer-search-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: SEARCH_PROVIDER
        value: tavily
      - key: SEARCH_RESULTS_PER_QUERY
        value: 10
      - key: TAVILY_API_KEY
        sync: false
